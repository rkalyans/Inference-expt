# Cloud Build pipeline: end-to-end test gate.
#
# Run against a freshly-deployed environment (default: dev). Promotion
# pipelines should make this a required predecessor before flipping traffic
# to staging/prod.
#
# Required substitutions:
#   _ENV                deployment env name (dev|staging|prod) used in failure
#                       logs; doesn't affect URLs
#   _BASE_URL           full https://app-<env>.<domain>
#   _AGENT_URL          full https://api-<env>.<domain>
#   _FB_API_KEY         Firebase Web API key (public; comes from trigger
#                       substitutions, same as frontend build)
#
# Required secrets (pulled at runtime from Secret Manager):
#   E2E_TEST_EMAIL      test user's email (provisioned once per env)
#   E2E_TEST_PASSWORD   test user's password
#
# Artifacts:
#   gs://<project>_cloudbuild/e2e/<build_id>/playwright-report.zip

substitutions:
  _ENV: ""
  _BASE_URL: ""
  _AGENT_URL: ""
  _FB_API_KEY: ""

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8 # Playwright + Chromium = CPU heavy

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/e2e-test-email/versions/latest
      env: E2E_TEST_EMAIL
    - versionName: projects/$PROJECT_ID/secrets/e2e-test-password/versions/latest
      env: E2E_TEST_PASSWORD

steps:
  - id: install
    name: mcr.microsoft.com/playwright:v1.48.0-jammy
    entrypoint: bash
    dir: tests/e2e
    args:
      - -c
      - |
        set -euo pipefail
        npm ci
        # Browsers are preinstalled in the playwright image, so no `npx
        # playwright install` step is needed.

  - id: test
    name: mcr.microsoft.com/playwright:v1.48.0-jammy
    entrypoint: bash
    dir: tests/e2e
    secretEnv:
      - E2E_TEST_EMAIL
      - E2E_TEST_PASSWORD
    env:
      - "E2E_BASE_URL=${_BASE_URL}"
      - "E2E_AGENT_URL=${_AGENT_URL}"
      - "E2E_FIREBASE_API_KEY=${_FB_API_KEY}"
      - "CI=1"
    args:
      - -c
      - |
        set -euo pipefail
        # Run all projects. Cloud Build fails the step on non-zero exit, which
        # is what we want — a red e2e blocks promotion.
        npx playwright test

  - id: upload-report
    name: gcr.io/cloud-builders/gsutil
    dir: tests/e2e
    entrypoint: bash
    # Run even if `test` fails so we always retain the HTML report.
    args:
      - -c
      - |
        set -euo pipefail
        if [ -d playwright-report ]; then
          zip -rq playwright-report.zip playwright-report
          gsutil cp playwright-report.zip \
            gs://${PROJECT_ID}_cloudbuild/e2e/${BUILD_ID}/playwright-report.zip
        fi
        if [ -f playwright-junit.xml ]; then
          gsutil cp playwright-junit.xml \
            gs://${PROJECT_ID}_cloudbuild/e2e/${BUILD_ID}/playwright-junit.xml
        fi
