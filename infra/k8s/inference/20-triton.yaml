---
# Triton Inference Server hosting FashionCLIP (ONNX) for clothing-item embeddings.
# The model repository is loaded from a GCS bucket via gcsfuse-csi-driver
# (preinstalled on GKE >=1.26). The bucket is `<project>-fashionclip-models`,
# created in a separate Terraform step before this manifest is applied.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: triton
  namespace: inference
  labels:
    app: triton
    component: vision
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: triton }
  template:
    metadata:
      labels:
        app: triton
        component: vision
      annotations:
        gke-gcsfuse/volumes: "true"
        gke-gcsfuse/cpu-limit: "500m"
        gke-gcsfuse/memory-limit: "512Mi"
    spec:
      serviceAccountName: triton
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-l4
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: present
          effect: NoSchedule
      containers:
        - name: triton
          image: nvcr.io/nvidia/tritonserver:24.08-py3
          imagePullPolicy: IfNotPresent
          args:
            - tritonserver
            - --model-repository=/models
            - --model-control-mode=poll
            - --repository-poll-secs=60
            - --log-info=true
            - --strict-model-config=false
            - --grpc-port=8001
            - --http-port=8002
            - --metrics-port=8003
          ports:
            - { name: grpc, containerPort: 8001 }
            - { name: http, containerPort: 8002 }
            - { name: metrics, containerPort: 8003 }
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: 12Gi
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet: { path: /v2/health/ready, port: http }
            periodSeconds: 10
            failureThreshold: 12 # allow ~2 min for model load
          livenessProbe:
            httpGet: { path: /v2/health/live, port: http }
            periodSeconds: 30
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
      volumes:
        - name: models
          csi:
            driver: gcsfuse.csi.storage.gke.io
            readOnly: true
            volumeAttributes:
              # Substituted via envsubst at apply time. See runbook.
              bucketName: ${MODEL_REPO_BUCKET}
              mountOptions: "implicit-dirs,file-mode=664,dir-mode=775"
---
apiVersion: v1
kind: Service
metadata:
  name: triton
  namespace: inference
  annotations:
    networking.gke.io/load-balancer-type: "Internal"
    cloud.google.com/l4-rbs: "enabled"
spec:
  type: LoadBalancer
  selector:
    app: triton
  ports:
    - { name: grpc, port: 8001, targetPort: grpc, protocol: TCP }
    - { name: http, port: 8002, targetPort: http, protocol: TCP }
